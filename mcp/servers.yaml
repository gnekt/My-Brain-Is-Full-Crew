servers:
  - name: Gmail
    type: http
    url: "https://gmail.mcp.claude.com/mcp"
    env: {}
    exclude: []
  - name: Google-Calendar
    type: http
    url: "https://gcal.mcp.claude.com/mcp"
    env: {}
    exclude: []
  - name: engram
    type: stdio
    command: uvx
    args: [engram-memory, serve, --mcp]
    env: {}
    exclude: []
